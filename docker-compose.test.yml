name: curs-test

services:
  test-db:
    image: postgres:17.7-alpine3.23
    shm_size: 128mb
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  test-redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-test
    image: curs-backend-test:latest
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:?POSTGRES_HOST is required}
      POSTGRES_PORT: ${POSTGRES_PORT:?POSTGRES_PORT is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      REDIS_HOST: ${REDIS_HOST:?REDIS_HOST is required}
      REDIS_PORT: ${REDIS_PORT:?REDIS_PORT is required}
      REDIS_DB: ${REDIS_DB:?REDIS_DB is required}
      REDIS_PASSWORD: ${REDIS_PASSWORD?REDIS_PASSWORD is required}
      CACHE_ENABLED: ${CACHE_ENABLED:?CACHE_ENABLED is required}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:?RATE_LIMIT_ENABLED is required}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ALGORITHM: ${ALGORITHM:?ALGORITHM is required}
      SEED_DIR: ${SEED_DIR:?SEED_DIR is required}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:?DEEPSEEK_API_KEY is required}
      LOG_LEVEL: ${LOG_LEVEL:?LOG_LEVEL is required}
    depends_on:
      test-db:
        condition: service_healthy
      test-redis:
        condition: service_healthy

  frontend-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-test
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?VITE_API_BASE_URL is required}
    image: curs-frontend-test:latest
    command: ["npm", "run", "test"]
